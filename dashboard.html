<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>netmon</title>
<style>
:root {
  --surface-1: #fcfcfb; --page: #f9f9f7;
  --ink-1: #0b0b0b; --ink-2: #52514e; --ink-muted: #898781;
  --grid: #e1e0d9; --baseline: #c3c2b7; --border: rgba(11,11,11,0.10);
  --c-router: #2a78d6; --c-cf: #1baf7a; --c-goog: #eda100;
  --c-sys: #e87ba4; --c-down: #008300; --c-up: #eb6834; --c-rssi: #4a3aa7; --c-isp: #eb6834;
  --c-temp: #d84c2f; --c-humid: #2a78d6; --c-co2: #7a52c9;
  --st-good: #0ca30c; --st-warn: #fab219; --st-serious: #ec835a; --st-crit: #d03b3b;
  --cat-1:#2a78d6; --cat-2:#1baf7a; --cat-3:#eda100; --cat-4:#008300;
  --cat-5:#4a3aa7; --cat-6:#e34948; --cat-7:#e87ba4; --cat-8:#898781;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19; --page: #0d0d0d;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --c-router: #3987e5; --c-cf: #199e70; --c-goog: #c98500;
    --c-sys: #d55181; --c-down: #008300; --c-up: #d95926; --c-rssi: #9085e9; --c-isp: #d95926;
    --c-temp: #e5674b; --c-humid: #3987e5; --c-co2: #9a7ce0;
    --cat-1:#3987e5; --cat-2:#199e70; --cat-3:#c98500; --cat-4:#008300;
    --cat-5:#9085e9; --cat-6:#e66767; --cat-7:#d55181; --cat-8:#898781;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--page); color: var(--ink-1);
  font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
h1 { font-size: 18px; font-weight: 600; margin: 0; }
h1 small { color: var(--ink-muted); font-weight: 400; font-size: 12px; margin-left: 8px; }
.topbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 0 0 16px; }
.controls .spacer { flex: 1; }
.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface-1); }
.seg button {
  border: 0; background: none; color: var(--ink-2); padding: 6px 12px;
  font: inherit; cursor: pointer;
}
.seg button.on { background: var(--ink-1); color: var(--page); font-weight: 600; }
button.act {
  border: 1px solid var(--border); border-radius: 8px; background: var(--surface-1);
  color: var(--ink-1); padding: 6px 14px; font: inherit; cursor: pointer;
}
button.act:disabled { color: var(--ink-muted); cursor: wait; }
.banner {
  display: flex; gap: 10px; align-items: center;
  background: var(--surface-1); border: 1px solid var(--border);
  border-left-width: 4px; border-radius: 10px; padding: 12px 14px; margin: 0 0 12px;
}
.banner .txt { flex: 1; }
.banner .when { color: var(--ink-muted); font-size: 12px; white-space: nowrap; }
.banner.ok   { border-left-color: var(--st-good); }
.banner.warn { border-left-color: var(--st-warn); }
.banner.bad  { border-left-color: var(--st-crit); }
.tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin: 0 0 16px; }
.tile {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
.tile .lbl { color: var(--ink-2); font-size: 12px; display: flex; gap: 6px; align-items: center; }
.tile .val { font-size: 20px; font-weight: 600; margin-top: 2px; }
.tile .sub { color: var(--ink-muted); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.dot.ok { background: var(--st-good); } .dot.warn { background: var(--st-warn); }
.dot.bad { background: var(--st-crit); } .dot.unknown { background: var(--ink-muted); }
.grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; }
.section-sep { display: flex; align-items: center; gap: 14px; margin: 26px 2px 14px; }
.section-sep::before, .section-sep::after { content: ""; height: 1px; background: var(--border); flex: 1; }
.section-sep span { color: var(--ink-2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 12px 6px; position: relative;
}
.card h2 { font-size: 13px; font-weight: 600; margin: 0 0 2px; }
.card .legend { display: flex; gap: 12px; flex-wrap: wrap; margin: 2px 0 4px; }
.legend span { color: var(--ink-2); font-size: 11px; display: inline-flex; align-items: center; gap: 5px; }
.legend i { width: 14px; height: 0; border-top: 3px solid; border-radius: 2px; }
.chart { width: 100%; display: block; }
.donut-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; padding-bottom: 6px; }
.donut-legend { flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 3px; }
.donut-note { font-size: 12px; color: var(--ink-muted); line-height: 1.4; padding: 4px 0 6px; }
.ul-cap { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-top: 6px; font-size: 11px; color: var(--ink-2); }
.ul-lab { color: var(--ink-muted); }
.ul-hop { display: inline-flex; align-items: center; gap: 5px; }
.ul-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dl-row { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.dl-sw { width: 10px; height: 10px; border-radius: 2px; flex: none; }
.dl-nm { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.dl-vl { color: var(--ink-1); font-weight: 600; font-variant-numeric: tabular-nums; }
.loading .chart, .loading .tiles { opacity: 0.45; }
.tooltip {
  position: fixed; pointer-events: none; z-index: 10; display: none;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; font-size: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.18); min-width: 130px;
}
.tooltip .tt-t { color: var(--ink-muted); margin-bottom: 4px; }
.tooltip .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.tooltip .row i { width: 12px; height: 0; border-top: 3px solid; border-radius: 2px; flex: none; }
.tooltip .row .v { font-weight: 600; margin-left: auto; padding-left: 10px; font-variant-numeric: tabular-nums; }
.tooltip .row .n { color: var(--ink-2); }
details { margin: 16px 0; }
summary { cursor: pointer; color: var(--ink-2); }
table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: 8px; }
th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
th { color: var(--ink-2); font-weight: 600; }
.fail-row td:first-child { color: var(--st-crit); font-weight: 600; }
footer { color: var(--ink-muted); font-size: 12px; margin: 18px 0 8px; }
.qr-mini { margin-left: auto; text-align: center; color: var(--ink-muted); font-size: 11px; }
.qr-mini img {
  display: block; width: 96px; height: 96px; margin: 0 auto 2px;
  background: #ffffff; border-radius: 6px; padding: 4px; border: 1px solid var(--border);
}
@media (max-width: 700px) { .qr-mini { display: none; } }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="topbar">
    <h1>netmon <small id="src-label"></small></h1>
    <div class="qr-mini" id="qr-mini">
      <img id="qr-img" src="/api/qr.svg" alt="QR code linking to this dashboard">
      scan to open on phone
    </div>
  </div>
  <div id="banner" class="banner"><span id="banner-txt" class="txt">loading…</span><span id="banner-when" class="when"></span></div>
  <div class="controls">
    <div class="seg" id="range-seg">
      <button data-h="0.25">15m</button><button data-h="1">1h</button><button data-h="6" class="on">6h</button>
      <button data-h="24">24h</button><button data-h="168">7d</button>
    </div>
    <div class="seg" id="source-seg" style="display:none"></div>
    <div class="spacer"></div>
    <button class="act" id="btn-probe">Run checks now</button>
    <button class="act" id="btn-speed">Speed test now</button>
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="grid2" id="charts"></div>
  <div id="env-section" style="display:none">
    <div class="section-sep"><span>Environment</span></div>
    <div class="grid2" id="charts-env"></div>
  </div>
  <details id="events-box"><summary>Recent failures &amp; events</summary><div id="events"></div></details>
  <footer>netmon · phone test page at <a href="/phone" style="color:inherit">/phone</a></footer>
</div>
<div class="tooltip" id="tt"></div>
<script>
"use strict";
const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const COLORS = () => ({
  router: css('--c-router'), cf: css('--c-cf'), goog: css('--c-goog'),
  sys: css('--c-sys'), down: css('--c-down'), up: css('--c-up'),
  rssi: css('--c-rssi'), isp: css('--c-isp'), muted: css('--ink-muted'),
  temp: css('--c-temp'), humid: css('--c-humid'), co2: css('--c-co2')
});

let rangeH = 6, source = null, history = [], baseline = [], status = null;
let refetchTimer = null;

const $ = id => document.getElementById(id);
const fmt = {
  ms: v => v == null ? '—' : (v >= 100 ? Math.round(v) + ' ms' : v.toFixed(1) + ' ms'),
  pct: v => v == null ? '—' : v.toFixed(0) + '%',
  dbm: v => v == null ? '—' : Math.round(v) + ' dBm',
  mbps: v => v == null ? '—' : v.toFixed(1) + ' Mbps',
  mbData: v => v == null ? '—' : (v >= 1024 ? (v / 1024).toFixed(1) + ' GB' : v.toFixed(v < 10 ? 1 : 0) + ' MB'),
  time: t => new Date(t).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
  timeS: t => new Date(t).toLocaleTimeString(),
  dayTime: t => new Date(t).toLocaleString([], {weekday:'short', hour:'2-digit', minute:'2-digit'})
};

// ---------------- data fetch ----------------
async function fetchStatus() {
  try {
    status = await (await fetch('/api/status')).json();
    renderStatus();
  } catch (e) { bannerError(); }
}
async function fetchHistory() {
  $('app').classList.add('loading');
  try {
    const r = await (await fetch('/api/history?hours=' + rangeH)).json();
    history = r.rows;
    baseline = r.baseline || [];
    renderSources();
    renderCharts();
    renderEvents();
  } catch (e) { /* keep previous render */ }
  $('app').classList.remove('loading');
}
function bannerError() {
  const b = $('banner');
  b.className = 'banner bad';
  $('banner-txt').textContent = "Can't reach the netmon server — is it running on the Mac?";
  $('banner-when').textContent = '';
}

// ---------------- status row ----------------
const OPTIONAL_TILES = ['uptime', 'isp_box', 'router_wan'];  // hidden when a source lacks them
// Core tiles every collector reports — fixed order, grouped by the network stack, so
// switching source never reflows this block.
const TILE_DEFS = [
  ['uptime', 'Uptime'],
  ['wifi', 'WiFi'], ['router', 'Router'], ['internet', 'Internet'],
  ['dns_system', 'DNS (system)'], ['dns_router', 'DNS (router)'], ['dns_direct', 'DNS (direct)'],
  ['http', 'Web fetch'], ['speed', 'Speed']
];
// Source-specific tiles — a spoke without the router probe won't have these. Kept at the
// very end and grouped (both are ISP/upstream-side) so toggling adds/removes them without
// shifting the core block above.
const TRAILING_TILES = [['isp_box', 'ISP box'], ['router_wan', 'WAN link']];
function renderStatus() {
  if (!status) return;
  // per-source view (components + verdict) so the tiles/banner follow the source toggle;
  // fall back to the hub-wide status before a source is chosen
  const view = (status.by_source && status.by_source[source]) || status;
  const v = view.verdict || {level: 'unknown', text: 'no data yet'};
  const b = $('banner');
  b.className = 'banner ' + v.level;
  const icon = {ok: '✓', warn: '⚠', bad: '✕'}[v.level] || '·';
  $('banner-txt').textContent = icon + '  ' + v.text;
  $('banner-when').textContent = 'as of ' + fmt.timeS(status.ts * 1000);

  const tiles = $('tiles');
  tiles.textContent = '';
  // core → LAN devices → source-specific extras, so absent tiles only ever drop off the end
  const lanTiles = Object.keys(view.components || {}).filter(k => k.startsWith('lan_')).sort()
    .map(k => [k, k.slice(4)]);
  const defs = [...TILE_DEFS, ...lanTiles, ...TRAILING_TILES];
  for (const [key, label] of defs) {
    if (OPTIONAL_TILES.includes(key) && !(view.components && view.components[key])) continue;
    let level = 'unknown', val = '—', sub = '';
    if (key === 'speed') {
      const d = status.last_speed && status.last_speed.speed_down;
      const u = status.last_speed && status.last_speed.speed_up;
      if (d) { level = d.ok ? 'ok' : 'bad'; val = d.ok ? '↓' + d.value.toFixed(0) + (u && u.ok ? ' ↑' + u.value.toFixed(0) : '') : 'failed';
               sub = d.ok ? 'Mbps, ' + fmt.time(d.ts * 1000) : '';
               const ct = d.detail && d.detail.contention;
               if (ct && ct.other_down_mb > 30) {
                 level = 'warn';
                 const seg = Object.entries(ct.seg_tx_mb || {}).sort((a,b)=>b[1]-a[1])[0];
                 const segName = seg ? ({WIRED:'wired',WIRELESS0:'2.4G',WIRELESS1:'5G'}[seg[0]]||seg[0]) : '?';
                 sub = '⚠ ' + ct.other_down_mb.toFixed(0) + ' MB other traffic (' + segName + ')';
               } }
    } else {
      const c = view.components && view.components[key];
      if (c) {
        level = c.level; val = c.label || '—';
        if (c.sub) sub = c.sub;
        if (key === 'wifi' && c.sample && c.sample.detail) {
          const d = c.sample.detail;
          sub = (d.band || '') + (d.channel != null ? ' ch' + d.channel : '')
                + ' · ' + (d.rate_mbps != null ? Math.round(d.rate_mbps) : '?') + ' Mbps';
        }
      }
    }
    const t = document.createElement('div'); t.className = 'tile';
    const l = document.createElement('div'); l.className = 'lbl';
    const dot = document.createElement('span'); dot.className = 'dot ' + level;
    l.append(dot, document.createTextNode(label + (level === 'warn' ? ' ⚠' : level === 'bad' ? ' ✕' : '')));
    const vv = document.createElement('div'); vv.className = 'val'; vv.textContent = val;
    t.append(l, vv);
    if (sub) { const s = document.createElement('div'); s.className = 'sub'; s.textContent = sub; t.append(s); }
    tiles.append(t);
  }
}

// ---------------- sources ----------------
function renderSources() {
  const srcs = [...new Set(history.map(r => r.source))].filter(s => !history.some(
    r => r.source === s && r.probe.startsWith('phone_')) || true);
  const nonPhone = [...new Set(history.filter(r => !r.probe.startsWith('phone_')).map(r => r.source))];
  if (!source || !nonPhone.includes(source)) {
    // default to the box serving this page (the hub), not just whoever appears first
    const own = status && status.source;
    source = (own && nonPhone.includes(own)) ? own : (nonPhone[0] || null);
  }
  renderStatus();  // tiles/banner depend on the chosen source
  $('src-label').textContent = source ? 'measuring from ' + source : '';
  const seg = $('source-seg');
  if (nonPhone.length > 1) {
    seg.style.display = '';
    seg.textContent = '';
    for (const s of nonPhone) {
      const b = document.createElement('button');
      b.textContent = s; b.className = s === source ? 'on' : '';
      b.onclick = () => { source = s; renderSources(); renderCharts(); };
      seg.append(b);
    }
  } else seg.style.display = 'none';
}

// ---------------- charts ----------------
function pick(probe, target) {
  return history.filter(r => r.probe === probe && (target == null || r.target === target)
                          && r.source === source);
}
// Sleep-clock artifact filter (opt-in per series via dropSleepArtifacts).
// A ping/DNS reading can't legitimately exceed the probe's own timeout (a few
// seconds). When the Mac sleeps mid-probe the wall clock jumps, so the reading
// resumes inflated to tens of seconds AND lands right after a gap in collection
// (the sleep itself — the collector runs under launchd KeepAlive, so a multi-
// minute gap means the machine was asleep/off, not a crash). We drop a point
// only when BOTH hold: it sits at such a gap and it's far above any possible
// real round-trip. A merely-long ping during normal operation is never touched.
const SLEEP_GAP_S = 60;     // no samples for this long ⇒ collector was frozen (asleep/off)
const ARTIFACT_MS = 8000;   // above the ping timeout: impossible for a real round-trip

function seriesOf(rows, valueFn, dropSleepArtifacts) {
  const pts = [], fails = [];
  let prevTs = null;
  for (const r of rows) {
    const gap = prevTs != null ? r.ts - prevTs : 0;
    prevTs = r.ts;
    const v = valueFn ? valueFn(r) : r.value;
    if (r.ok && v != null) {
      if (dropSleepArtifacts && gap > SLEEP_GAP_S && v > ARTIFACT_MS) continue;  // frozen clock at a sleep boundary
      pts.push({t: r.ts * 1000, v});
    }
    else fails.push({t: r.ts * 1000, err: (r.detail && r.detail.error) || 'failed'});
  }
  return {pts, fails};
}

let drawQueue = [];
function bandChanges(wifiRows) {
  // consecutive samples where band or channel changed, e.g. 2GHz ch7 -> 5GHz ch44
  const out = [];
  let prev = null;
  for (const r of wifiRows) {
    if (!r.ok || !r.detail || r.detail.band == null) continue;
    const cur = r.detail.band + ' ch' + (r.detail.channel ?? '?');
    if (prev && cur !== prev) out.push({t: r.ts * 1000, from: prev, to: cur});
    prev = cur;
  }
  return out;
}

function renderCharts() {
  const C = COLORS();
  const box = $('charts');
  box.textContent = '';
  const envBox = $('charts-env');
  envBox.textContent = '';
  $('env-section').style.display = 'none';
  drawQueue = [];
  if (!source) return;
  const loss = r => (r.detail && r.detail.loss_pct != null) ? r.detail.loss_pct : (r.ok ? 0 : 100);

  const hop2 = pick('hop2_ping');
  chartCard(box, 'Latency', 'ms', [
    {name: 'router', color: C.router, ...seriesOf(pick('gateway_ping'), null, true)},
    ...(hop2.length ? [{name: 'ISP box', color: C.isp, ...seriesOf(hop2, null, true)}] : []),
    {name: '1.1.1.1', color: C.cf, ...seriesOf(pick('wan_ping', '1.1.1.1'), null, true)},
    {name: '8.8.8.8', color: C.goog, ...seriesOf(pick('wan_ping', '8.8.8.8'), null, true)}
  ], {fmt: fmt.ms, zero: true, clipMax: 100});

  chartCard(box, 'Packet loss', '%', [
    {name: 'router', color: C.router, pts: pick('gateway_ping').map(r => ({t: r.ts*1000, v: loss(r)})), fails: []},
    ...(hop2.length ? [{name: 'ISP box', color: C.isp,
        pts: hop2.map(r => ({t: r.ts*1000, v: loss(r)})), fails: []}] : []),
    {name: '1.1.1.1', color: C.cf, pts: pick('wan_ping','1.1.1.1').map(r => ({t: r.ts*1000, v: loss(r)})), fails: []},
    {name: '8.8.8.8', color: C.goog, pts: pick('wan_ping','8.8.8.8').map(r => ({t: r.ts*1000, v: loss(r)})), fails: []}
  ], {fmt: fmt.pct, zero: true, max: 100});

  chartCard(box, 'DNS lookup time', 'ms', [
    {name: 'system', color: C.sys, ...seriesOf(pick('dns', 'system'), null, true)},
    {name: 'via router', color: C.router, ...seriesOf(pick('dns', 'router'), null, true)},
    {name: 'direct 1.1.1.1', color: C.cf, ...seriesOf(pick('dns', 'direct'), null, true)}
  ], {fmt: fmt.ms, zero: true, clipMax: 100});

  chartCard(box, 'WiFi signal', 'dBm', [
    {name: 'signal', color: C.rssi, ...seriesOf(pick('wifi'))},
    {name: 'noise', color: C.muted, pts: pick('wifi').filter(r => r.ok && r.detail && r.detail.noise_dbm != null)
        .map(r => ({t: r.ts*1000, v: r.detail.noise_dbm})), fails: []}
  ], {fmt: fmt.dbm, clip: 0.95,  // tame the odd spurious-strong RSSI spike so the real signal isn't squashed; weak dips (the low end) are kept
      events: bandChanges(pick('wifi')).map(c => ({t: c.t, label: '→ ' + c.to})),
      extraTip: t => {
      const r = nearest(pick('wifi'), t);
      return r && r.detail ? (r.detail.band || '') + ' ch' + (r.detail.channel ?? '?') + ' · link ' + (r.detail.rate_mbps ?? '?') + ' Mbps' : '';
  }});

  const bwCard = chartCard(box, 'Bandwidth', 'Mbps', [
    {name: 'download', color: C.down, ...seriesOf(pick('speed_down'))},
    {name: 'upload', color: C.up, ...seriesOf(pick('speed_up'))}
  ], {fmt: fmt.mbps, zero: true, markers: true, gapMs: 25 * 60e3}); // join 15-min tests; break on sleep gaps
  underLoadCaption(bwCard);

  const lanTargets = [...new Set(pick('lan_ping').map(r => r.target))].sort();
  if (lanTargets.length) {
    const lanColors = [C.rssi, C.sys, C.goog, C.cf];
    chartCard(box, 'LAN devices', 'ms', lanTargets.map((t, i) => ({
      name: t, color: lanColors[i % lanColors.length],
      ...seriesOf(pick('lan_ping', t), null, true)
    })), {fmt: fmt.ms, zero: true});
  }

  // Per-device usage *during* the selected period: diff the last snapshot in
  // the window against a start snapshot. Prefer the baseline captured just
  // before the window (router totals refresh only every ~30-90 min, so short
  // windows often have <2 in-window snapshots); fall back to the first
  // in-window snapshot if there's no earlier data.
  const ctRows = history.filter(r => r.probe === 'client_traffic' && r.source === source);
  const ctEnd = ctRows[ctRows.length - 1];
  const ctStart = baseline.find(r => r.source === source) || ctRows[0];
  if (ctEnd && ctEnd.detail && ctEnd.detail.clients && ctStart && ctStart !== ctEnd) {
    deviceDonut(box, ctDelta(ctStart, ctEnd), 'last ' + rangeLabel());
  }

  // Environment section (Aranet4 sensor) — a separate group below a divider,
  // only shown when the sensor is reporting. Temperature, humidity and CO2 each
  // get their own card.
  const air = pick('aranet');
  if (air.length) {
    $('env-section').style.display = '';
    chartCard(envBox, 'Temperature', '°C', [
      {name: 'temperature', color: C.temp, ...seriesOf(air, r => r.detail && r.detail.temp_c)}
    ], {fmt: v => v.toFixed(1) + ' °C', gapMs: 22 * 60e3});  // break line on sensor dropout, not normal logging gaps

    chartCard(envBox, 'Humidity', '%RH', [
      {name: 'humidity', color: C.humid, ...seriesOf(air, r => r.detail && r.detail.humidity)}
    ], {fmt: v => v.toFixed(0) + ' %', gapMs: 22 * 60e3});

    chartCard(envBox, 'CO₂', 'ppm', [
      {name: 'CO₂', color: C.co2, ...seriesOf(air)}
    ], {fmt: v => Math.round(v) + ' ppm', zero: true, gapMs: 22 * 60e3,
        refLines: [{v: 800, label: '800'}, {v: 1400, label: '1400'}]});
  }

  // draw after every card is in the grid, so each holder has its final width
  for (const job of drawQueue) drawChart(...job);
  drawQueue = [];
}

// Label of the currently selected range button (e.g. "6h", "15m").
function rangeLabel() {
  const on = [...$('range-seg').children].find(x => x.classList.contains('on'));
  return on ? on.textContent.trim() : rangeH + 'h';
}

// Per-device down/up MB used between two cumulative snapshots. A negative delta
// means the router counter reset in the window, so fall back to the end value.
function ctDelta(startSnap, endSnap) {
  const start = {};
  (startSnap.detail.clients || []).forEach(c => { start[c.mac] = c; });
  return (endSnap.detail.clients || []).map(c => {
    const s = start[c.mac];
    let dd = c.down_mb - (s ? s.down_mb : 0);
    let du = c.up_mb - (s ? s.up_mb : 0);
    if (dd < 0) dd = c.down_mb;
    if (du < 0) du = c.up_mb;
    return {name: c.name, mac: c.mac, ip: c.ip, down_mb: dd, up_mb: du};
  });
}

function deviceDonut(parent, clients, label) {
  const cats = [1,2,3,4,5,6,7].map(i => css('--cat-' + i));
  let items = clients.map(c => ({
    name: (c.name || c.mac || '?') + (c.ip ? ' ·' + c.ip.split('.').pop() : ''),
    value: (c.down_mb || 0) + (c.up_mb || 0)
  })).filter(x => x.value > 0.05).sort((a, b) => b.value - a.value);

  const card = document.createElement('div'); card.className = 'card';
  const h = document.createElement('h2'); h.textContent = 'Bandwidth by device · ' + (label || 'recent'); card.append(h);
  parent.append(card);
  if (!items.length) {
    const note = document.createElement('div'); note.className = 'donut-note';
    note.textContent = 'No per-device traffic recorded in this period — the router reports totals only every ~30–90 min, so try a wider range.';
    card.append(note);
    return;
  }
  const top = items.slice(0, 7);
  const rest = items.slice(7);
  if (rest.length) top.push({name: 'Other (' + rest.length + ')', value: rest.reduce((s, x) => s + x.value, 0)});
  top.forEach((s, i) => s.color = i < 7 ? cats[i] : css('--cat-8'));
  const total = top.reduce((s, x) => s + x.value, 0) || 1;
  const row = document.createElement('div'); row.className = 'donut-row'; card.append(row);

  const NS = 'http://www.w3.org/2000/svg';
  const size = 168, cx = size / 2, cy = size / 2, rO = 72, rI = 44;
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.setAttribute('width', size); svg.setAttribute('height', size); svg.style.flex = 'none';
  const tt = $('tt');
  let a0 = -Math.PI / 2;
  for (const s of top) {
    const a1 = a0 + s.value / total * 2 * Math.PI;
    const pt = (r, a) => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    const [x0, y0] = pt(rO, a0), [x1, y1] = pt(rO, a1), [x2, y2] = pt(rI, a1), [x3, y3] = pt(rI, a0);
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const path = document.createElementNS(NS, 'path');
    path.setAttribute('d', `M${x0},${y0} A${rO},${rO} 0 ${large} 1 ${x1},${y1} L${x2},${y2} A${rI},${rI} 0 ${large} 0 ${x3},${y3} Z`);
    path.setAttribute('fill', s.color);
    path.setAttribute('stroke', css('--surface-1')); path.setAttribute('stroke-width', '2');
    const pct = s.value / total * 100;
    path.addEventListener('pointermove', ev => {
      tt.textContent = '';
      const t = document.createElement('div'); t.className = 'tt-t'; t.textContent = s.name; tt.append(t);
      const r = document.createElement('div'); r.className = 'row';
      const n = document.createElement('span'); n.className = 'n'; n.textContent = pct.toFixed(0) + '%';
      const v = document.createElement('span'); v.className = 'v'; v.textContent = fmt.mbData(s.value);
      r.append(n, v); tt.append(r);
      tt.style.display = 'block';
      tt.style.left = Math.min(ev.clientX + 14, window.innerWidth - 160) + 'px';
      tt.style.top = (ev.clientY + 14) + 'px';
    });
    path.addEventListener('pointerleave', () => tt.style.display = 'none');
    svg.append(path); a0 = a1;
  }
  const tot = fmt.mbData(total).split(' ');
  const mk = (y, sz, fill, txt, w) => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', cx); t.setAttribute('y', y); t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', sz); t.setAttribute('fill', fill);
    if (w) t.setAttribute('font-weight', w);
    t.textContent = txt; svg.append(t);
  };
  mk(cy - 1, 16, css('--ink-1'), tot[0], 600);
  mk(cy + 12, 9, css('--ink-muted'), tot[1] + ' total');
  row.append(svg);

  const leg = document.createElement('div'); leg.className = 'donut-legend';
  for (const s of top) {
    const li = document.createElement('div'); li.className = 'dl-row';
    const sw = document.createElement('span'); sw.className = 'dl-sw'; sw.style.background = s.color;
    const nm = document.createElement('span'); nm.className = 'dl-nm'; nm.textContent = s.name;
    const vl = document.createElement('span'); vl.className = 'dl-vl';
    vl.textContent = (s.value / total * 100).toFixed(0) + '%';
    li.append(sw, nm, vl); leg.append(li);
  }
  row.append(leg);
}

function nearest(rows, t) {
  let best = null, bd = Infinity;
  for (const r of rows) { const d = Math.abs(r.ts * 1000 - t); if (d < bd) { bd = d; best = r; } }
  return bd < 90000 ? best : null;
}

function chartCard(parent, title, unit, series, opts) {
  const card = document.createElement('div'); card.className = 'card';
  const h = document.createElement('h2'); h.textContent = title + ' (' + unit + ')';
  card.append(h);
  const leg = document.createElement('div'); leg.className = 'legend';
  if (series.length > 1) {
    for (const s of series) {
      const sp = document.createElement('span');
      const i = document.createElement('i'); i.style.borderTopColor = s.color;
      sp.append(i, document.createTextNode(s.name)); leg.append(sp);
    }
  }
  card.append(leg);
  const holder = document.createElement('div');
  card.append(holder);
  parent.append(card);
  drawQueue.push([holder, series, opts]);
  return card;
}

// Compact per-hop "latency under load" readout beneath the Bandwidth chart. Uses
// the pings taken *during* the last speed test so a throughput drop points at the
// culprit hop: your router (local WiFi/LAN) vs the in-between box vs the ISP path.
function underLoadCaption(card) {
  const rows = pick('speed_down').filter(r => r.detail && r.detail.under_load);
  const last = rows[rows.length - 1];
  if (!last) return;
  const ul = last.detail.under_load;
  const cap = document.createElement('div'); cap.className = 'ul-cap';
  const lab = document.createElement('span'); lab.className = 'ul-lab'; lab.textContent = 'Latency under load';
  cap.append(lab);
  let any = false;
  for (const [name, key] of [['router', 'gateway'], ['box', 'hop2'], ['internet', 'wan']]) {
    const h = ul[key];
    if (!h || h.max_ms == null) continue;
    any = true;
    const v = h.max_ms;
    const col = v > 150 ? '--st-crit' : v > 60 ? '--st-warn' : '--st-good';
    const hop = document.createElement('span'); hop.className = 'ul-hop';
    const dot = document.createElement('i'); dot.className = 'ul-dot'; dot.style.background = css(col);
    const txt = document.createElement('span'); txt.textContent = name + ' ' + Math.round(v) + ' ms';
    hop.append(dot, txt); cap.append(hop);
  }
  if (any) card.append(cap);
}

function drawChart(holder, series, opts) {
  // A series may set axis:'right' to plot against a second Y-axis (its own scale,
  // configured by opts.right) — e.g. humidity %RH beside temperature °C.
  const rightSeries = series.filter(s => s.axis === 'right');
  const leftSeries = series.filter(s => s.axis !== 'right');
  const hasRight = rightSeries.length > 0;
  const W = Math.max(300, holder.clientWidth || 480), H = 190;
  const M = {l: 44, r: hasRight ? 40 : 12, t: 8, b: 22};
  const iw = W - M.l - M.r, ih = H - M.t - M.b;
  const now = Date.now(), t0 = now - rangeH * 3600 * 1000;
  const X = t => M.l + (t - t0) / (now - t0) * iw;

  // Build a Y-scale (min/max/ticks + mappers) for a subset of series. `o` supplies
  // the axis options (zero/clip/clipMax/max); out-of-range points get clamped by Yc.
  function scaleFor(subset, o) {
    let vmin = Infinity, vmax = -Infinity, allv = [];
    for (const s of subset) for (const p of s.pts) {
      if (p.v < vmin) vmin = p.v; if (p.v > vmax) vmax = p.v; allv.push(p.v);
    }
    if (!isFinite(vmin)) { vmin = 0; vmax = 1; }
    if (o.zero) vmin = Math.min(0, vmin);
    // clip so one huge spike doesn't flatten everything; out-of-range points poke
    // out at the top edge. clipMax = fixed ceiling; clip = percentile.
    if (o.clipMax != null) {
      vmax = o.clipMax;
    } else if (o.clip && allv.length > 4) {
      allv.sort((a, b) => a - b);
      vmax = Math.max(vmin + 1, allv[Math.floor(o.clip * (allv.length - 1))]);
    }
    if (o.max != null) vmax = Math.max(vmax, 1); else if (vmax === vmin) vmax = vmin + 1;
    const [ymin, ymax, ticks] = niceScale(vmin, vmax, o.max);
    const Y = v => M.t + ih - (v - ymin) / (ymax - ymin) * ih;
    const Yc = v => Math.max(M.t, Math.min(H - M.b, Y(v)));
    return {ymin, ymax, ticks, Y, Yc};
  }
  const leftScale = scaleFor(leftSeries.length ? leftSeries : series, opts);
  const rightScale = hasRight ? scaleFor(rightSeries, opts.right || {}) : null;
  const scaleOf = s => (s.axis === 'right' && rightScale) ? rightScale : leftScale;
  const {ymin, ymax, ticks, Y, Yc} = leftScale;  // gridlines + reference lines follow the left axis

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'chart');
  svg.setAttribute('height', H);
  const el = (n, at, parent2) => {
    const e = document.createElementNS(NS, n);
    for (const k in at) e.setAttribute(k, at[k]);
    (parent2 || svg).append(e); return e;
  };

  // gridlines + left y labels (tinted to the series colour when a right axis shares the plot)
  const fmtTick = tv => Math.abs(tv) >= 1000 ? (tv / 1000) + 'k' : tv;
  const leftLabelFill = hasRight && leftSeries.length ? leftSeries[0].color : css('--ink-muted');
  for (const tv of ticks) {
    el('line', {x1: M.l, x2: W - M.r, y1: Y(tv), y2: Y(tv), stroke: css('--grid'), 'stroke-width': 1});
    const tx = el('text', {x: M.l - 6, y: Y(tv) + 3.5, 'text-anchor': 'end', 'font-size': 10, fill: leftLabelFill});
    tx.textContent = fmtTick(tv);
  }
  // right y labels (no gridlines — they'd collide with the left set)
  if (rightScale) {
    for (const tv of rightScale.ticks) {
      const tx = el('text', {x: W - M.r + 6, y: rightScale.Y(tv) + 3.5, 'text-anchor': 'start',
                             'font-size': 10, fill: rightSeries[0].color});
      tx.textContent = fmtTick(tv);
    }
  }
  // reference lines (e.g. CO2 comfort thresholds): dashed rule + a small label
  for (const rl of (opts.refLines || [])) {
    if (rl.v < ymin || rl.v > ymax) continue;
    el('line', {x1: M.l, x2: W - M.r, y1: Y(rl.v), y2: Y(rl.v), stroke: css('--baseline'),
                'stroke-width': 1, 'stroke-dasharray': '3,3', opacity: 0.8});
    if (rl.label) {
      const tx = el('text', {x: W - M.r - 2, y: Y(rl.v) - 2.5, 'text-anchor': 'end',
                             'font-size': 9, fill: css('--ink-muted')});
      tx.textContent = rl.label;
    }
  }
  // x ticks
  for (const [t, lbl] of timeTicks(t0, now)) {
    el('line', {x1: X(t), x2: X(t), y1: H - M.b, y2: H - M.b + 3, stroke: css('--baseline'), 'stroke-width': 1});
    const tx = el('text', {x: X(t), y: H - 6, 'text-anchor': 'middle', 'font-size': 10, fill: css('--ink-muted')});
    tx.textContent = lbl;
  }
  el('line', {x1: M.l, x2: W - M.r, y1: H - M.b, y2: H - M.b, stroke: css('--baseline'), 'stroke-width': 1});

  const gapMs = opts.gapMs || Math.max(3 * 30000, (now - t0) / 120);
  for (const s of series) {
    const {Y, Yc} = scaleOf(s);  // this series' axis (left by default, right if axis:'right')
    if (opts.dashes) {
      // sparse discrete samples: a dash per sample, no lines between. Width caps at
      // 15 min but shrinks to the midpoints of neighbours so clustered tests don't overlap.
      const halfMs = (opts.dashMs || 15 * 60e3) / 2;
      const pts = s.pts;
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        let l = p.t - halfMs, r = p.t + halfMs;
        if (i > 0) l = Math.max(l, (pts[i - 1].t + p.t) / 2);
        if (i < pts.length - 1) r = Math.min(r, (p.t + pts[i + 1].t) / 2);
        el('line', {x1: X(l), x2: X(r), y1: Yc(p.v), y2: Yc(p.v),
                    stroke: s.color, 'stroke-width': 2.5, 'stroke-linecap': 'butt'});
      }
    } else {
      let d = '', prev = null;
      for (const p of s.pts) {
        d += (prev && p.t - prev.t < gapMs ? 'L' : 'M') + X(p.t).toFixed(1) + ',' + Yc(p.v).toFixed(1);
        prev = p;
      }
      if (d) el('path', {d, fill: 'none', stroke: s.color, 'stroke-width': 2,
                         'stroke-linejoin': 'round', 'stroke-linecap': 'round'});
      if (opts.markers) for (const p of s.pts)
        el('circle', {cx: X(p.t), cy: Yc(p.v), r: 4, fill: s.color, stroke: css('--surface-1'), 'stroke-width': 2});
      const last = s.pts[s.pts.length - 1];
      if (last) el('circle', {cx: X(last.t), cy: Yc(last.v), r: 4, fill: s.color, stroke: css('--surface-1'), 'stroke-width': 2});
    }
    // mark points that exceed the clipped axis with a small triangle at the top edge
    for (const p of s.pts)
      if (Y(p.v) < M.t - 0.5)
        el('path', {d: `M${X(p.t)},${M.t} l3,5 l-6,0 z`, fill: s.color});
    for (const f of s.fails)
      el('line', {x1: X(f.t), x2: X(f.t), y1: M.t, y2: M.t + 7, stroke: css('--st-crit'), 'stroke-width': 2});
  }

  // event markers (e.g. wifi band changes): full-height line + label at the top
  let lastLabelEnd = -Infinity;
  for (const evd of (opts.events || [])) {
    if (evd.t < t0 || evd.t > now) continue;
    const x = X(evd.t);
    el('line', {x1: x, x2: x, y1: M.t, y2: H - M.b, stroke: css('--ink-muted'),
                'stroke-width': 1, opacity: 0.7});
    if (x > lastLabelEnd + 8) {
      const w = evd.label.length * 5;
      const flip = x + 3 + w > W - M.r;   // near the right edge: put the label left of the line
      const tx = el('text', {x: flip ? x - 3 : x + 3, y: M.t + 8, 'font-size': 9,
                             fill: css('--ink-2'), 'text-anchor': flip ? 'end' : 'start'});
      tx.textContent = evd.label;
      lastLabelEnd = flip ? x : x + 3 + w;
    }
  }

  // hover layer
  const cross = el('line', {x1: 0, x2: 0, y1: M.t, y2: H - M.b, stroke: css('--baseline'),
                            'stroke-width': 1, visibility: 'hidden'});
  const tt = $('tt');
  svg.addEventListener('pointermove', ev => {
    const r = svg.getBoundingClientRect();
    const px = (ev.clientX - r.left) * (W / r.width);
    const t = t0 + (px - M.l) / iw * (now - t0);
    if (px < M.l || px > W - M.r) { cross.setAttribute('visibility', 'hidden'); tt.style.display = 'none'; return; }
    let snapT = null, bd = Infinity;
    for (const s of series) for (const p of s.pts) {
      const d = Math.abs(p.t - t); if (d < bd) { bd = d; snapT = p.t; }
    }
    if (snapT == null) return;
    cross.setAttribute('x1', X(snapT)); cross.setAttribute('x2', X(snapT));
    cross.setAttribute('visibility', 'visible');
    tt.textContent = '';
    const tl = document.createElement('div'); tl.className = 'tt-t';
    tl.textContent = fmt.timeS(snapT); tt.append(tl);
    for (const s of series) {
      let best = null, d2 = Infinity;
      for (const p of s.pts) { const d = Math.abs(p.t - snapT); if (d < d2) { d2 = d; best = p; } }
      const row = document.createElement('div'); row.className = 'row';
      const key = document.createElement('i'); key.style.borderTopColor = s.color;
      const n = document.createElement('span'); n.className = 'n'; n.textContent = s.name;
      const v = document.createElement('span'); v.className = 'v';
      v.textContent = (best && d2 < 90000) ? (s.fmt || opts.fmt)(best.v) : '—';
      row.append(key, n, v); tt.append(row);
    }
    if (opts.extraTip) {
      const ex = opts.extraTip(snapT);
      if (ex) { const d = document.createElement('div'); d.className = 'tt-t'; d.textContent = ex; tt.append(d); }
    }
    tt.style.display = 'block';
    const tw = tt.offsetWidth;
    tt.style.left = Math.min(ev.clientX + 14, window.innerWidth - tw - 8) + 'px';
    tt.style.top = (ev.clientY + 14) + 'px';
  });
  svg.addEventListener('pointerleave', () => { cross.setAttribute('visibility', 'hidden'); tt.style.display = 'none'; });
  holder.textContent = '';
  holder.append(svg);
}

function niceScale(lo, hi, forceMax) {
  if (forceMax != null && hi > forceMax * 0.6) hi = forceMax;
  const span = hi - lo || 1;
  const step = [1,2,2.5,5,10].map(m => m * Math.pow(10, Math.floor(Math.log10(span / 4))))
    .find(s => span / s <= 5.5) || Math.pow(10, Math.ceil(Math.log10(span / 4)));
  const ymin = Math.floor(lo / step) * step;
  const ymax = Math.ceil(hi / step) * step;
  const ticks = [];
  for (let v = ymin; v <= ymax + step / 2; v += step) ticks.push(Math.round(v * 100) / 100);
  return [ymin, ymax, ticks];
}
function timeTicks(t0, t1) {
  const span = t1 - t0;
  const steps = [60e3, 2*60e3, 3*60e3, 5*60e3, 15*60e3, 30*60e3, 60*60e3, 3*3600e3, 6*3600e3, 12*3600e3, 24*3600e3];
  const step = steps.find(s => span / s <= 7) || 24*3600e3;
  const out = [];
  let t = Math.ceil(t0 / step) * step;
  for (; t <= t1; t += step)
    out.push([t, span > 24*3600e3 ? fmt.dayTime(t) : fmt.time(t)]);
  return out;
}

// ---------------- events table ----------------
function renderEvents() {
  const box = $('events');
  box.textContent = '';
  const changes = bandChanges(history.filter(r => r.probe === 'wifi' && r.source === source))
    .map(c => ({ts: c.t / 1000, ok: true, source, probe: 'band change',
                target: c.from + ' → ' + c.to, value: null, detail: null}));
  const rows = history.filter(r => !r.ok || r.probe.startsWith('speed') || r.probe.startsWith('phone_')
                                        || r.probe === 'router_event')
    .concat(changes).sort((a, b) => a.ts - b.ts).slice(-80).reverse();
  const table = document.createElement('table');
  const thead = document.createElement('tr');
  for (const h of ['status', 'time', 'source', 'probe', 'target', 'value', 'detail']) {
    const th = document.createElement('th'); th.textContent = h; thead.append(th);
  }
  table.append(thead);
  for (const r of rows) {
    const tr = document.createElement('tr');
    if (!r.ok) tr.className = 'fail-row';
    const cells = [r.ok ? 'ok' : 'FAIL', fmt.timeS(r.ts * 1000), r.source, r.probe, r.target,
                   r.value != null ? String(Math.round(r.value * 10) / 10) : '—',
                   r.detail ? JSON.stringify(r.detail) : ''];
    for (const c of cells) { const td = document.createElement('td'); td.textContent = c; tr.append(td); }
    table.append(tr);
  }
  box.append(table);
}

$('btn-speed').addEventListener('click', async () => {
  const b = $('btn-speed'); b.disabled = true; b.textContent = 'Testing… (~25s)';
  try { await fetch('/api/run-speedtest', {method: 'POST'}); } catch (e) {}
  await fetchStatus(); await fetchHistory();
  b.disabled = false; b.textContent = 'Speed test now';
});
window.addEventListener('resize', () => renderCharts());
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { renderStatus(); renderCharts(); });

fetchStatus(); fetchHistory();
setInterval(fetchStatus, 15000);
setInterval(fetchHistory, 60000);
</script>
</body>
</html>
